<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Star Trail Scroll Effect</title>
<style>
  :root{--bg:#06101d;--text:#f8f1e7;--muted:rgba(248,241,231,.65);--trail:rgba(143,215,255,.65)}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;min-height:240svh}
  .fixed{position:fixed;inset:0;overflow:hidden;background:linear-gradient(#071426,#030712)}
  .trail{position:absolute;width:2px;height:120px;border-radius:999px;background:linear-gradient(var(--trail),transparent);transform-origin:top;opacity:.7}
  main{position:relative;z-index:2;min-height:100svh;display:grid;place-items:center;text-align:center;padding:28px} h1{font-size:clamp(44px,8vw,110px);line-height:.9;letter-spacing:0} p{color:var(--muted);font-size:20px;line-height:1.6}
  @media(prefers-reduced-motion:reduce){.trail{display:none}}
</style>
</head>
<body>
<div class="fixed" id="sky"></div>
<main><div><h1>Scroll star trails</h1><p>Use as a subtle section transition, not behind dense forms.</p></div></main>
<script>
  const sky = document.getElementById('sky');
  const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (!reduce) {
    for (let i=0;i<34;i++){
      const t=document.createElement('i'); t.className='trail';
      t.style.left=`${Math.random()*100}%`; t.style.top=`${Math.random()*100}%`;
      t.style.transform=`rotate(${35+Math.random()*18}deg)`;
      t.style.height=`${60+Math.random()*150}px`;
      sky.appendChild(t);
    }
    addEventListener('scroll', () => {
      const p = scrollY / (document.documentElement.scrollHeight - innerHeight);
      document.querySelectorAll('.trail').forEach((t,i)=> t.style.translate = `${p*(80+i%6*10)}px ${p*(220+i%8*16)}px`);
    }, {passive:true});
  }
</script>
</body>
</html>
