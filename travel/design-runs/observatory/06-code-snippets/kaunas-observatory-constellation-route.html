<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kaunas To Observatory Constellation Route</title>
<style>
  :root{--bg:#06101d;--text:#f8f1e7;--muted:rgba(248,241,231,.65);--line:rgba(248,241,231,.15);--star:#8fd7ff;--route:#f8f1e7}
  *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--text)}
  .spacer{height:50svh;display:grid;place-items:center;padding:28px;text-align:center}
  .stage{position:sticky;top:0;height:100svh;display:grid;place-items:center;overflow:hidden;background:radial-gradient(circle at 70% 20%,rgba(143,215,255,.12),transparent 28rem),var(--bg)}
  .copy{position:absolute;left:clamp(20px,6vw,72px);top:clamp(80px,14vh,140px);z-index:2;max-width:390px}
  .eyebrow{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--star)}
  h1{margin:12px 0 0;font-size:clamp(42px,7vw,92px);line-height:.9;letter-spacing:0}
  p{color:var(--muted);line-height:1.6}
  svg{width:min(1050px,94vw);height:auto;overflow:visible}
  .ghost{fill:none;stroke:var(--line);stroke-width:4;stroke-linecap:round}
  .route{fill:none;stroke:var(--route);stroke-width:4;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 12px rgba(143,215,255,.35))}
  .node{fill:var(--star);filter:drop-shadow(0 0 10px rgba(143,215,255,.9));opacity:.35}
  .label{fill:var(--text);font-size:18px;font-weight:700}.sub{fill:var(--muted);font-size:12px;letter-spacing:.08em;text-transform:uppercase}
  .marker{fill:#06101d;stroke:var(--star);stroke-width:4;filter:drop-shadow(0 0 14px rgba(143,215,255,.7))}
  @media (prefers-reduced-motion:reduce){.stage{position:relative}.route{stroke-dasharray:none!important}.node{opacity:1!important}.marker{display:none}}
</style>
</head>
<body>
<section class="spacer"><div><p class="eyebrow">Scroll route demo</p><h1>Kaunas to the telescope</h1><p>Use this as the route section pattern.</p></div></section>
<section id="routeSection" style="height:240svh">
  <div class="stage">
    <div class="copy"><p class="eyebrow">Constellation route</p><h1>Follow the sky line.</h1><p>Stops reveal as the group moves from Kaunas to the Observatory anchor.</p></div>
    <svg viewBox="0 0 1000 560" aria-hidden="true">
      <path class="ghost" d="M120 440 L300 340 L455 370 L630 230 L820 120"/>
      <path id="routePath" class="route" pathLength="1" d="M120 440 L300 340 L455 370 L630 230 L820 120"/>
      <circle class="node" cx="120" cy="440" r="7"/><text class="label" x="100" y="475">Kaunas</text><text class="sub" x="100" y="494">Depart</text>
      <circle class="node" cx="300" cy="340" r="7"/><text class="label" x="255" y="315">Mindunai</text><text class="sub" x="255" y="334">Optional</text>
      <circle class="node" cx="455" cy="370" r="7"/><text class="label" x="420" y="406">Moletai</text><text class="sub" x="420" y="425">Warm-up</text>
      <circle class="node" cx="630" cy="230" r="7"/><text class="label" x="594" y="205">Kulionys</text><text class="sub" x="594" y="224">Arrive early</text>
      <circle class="node" cx="820" cy="120" r="10"/><text class="label" x="750" y="94">Observatory</text><text class="sub" x="750" y="113">Night anchor</text>
      <circle id="marker" class="marker" cx="120" cy="440" r="12"/>
    </svg>
  </div>
</section>
<section class="spacer"><p>Reduced motion shows the full route without scroll animation.</p></section>
<script>
  const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const path = document.getElementById('routePath');
  const marker = document.getElementById('marker');
  const nodes = [...document.querySelectorAll('.node')];
  const length = path.getTotalLength();
  if (!reduce) {
    path.style.strokeDasharray = '1';
    path.style.strokeDashoffset = '1';
    function update(){
      const section = document.getElementById('routeSection');
      const rect = section.getBoundingClientRect();
      const progress = Math.min(1, Math.max(0, -rect.top / (rect.height - innerHeight)));
      path.style.strokeDashoffset = String(1 - progress);
      const point = path.getPointAtLength(length * progress);
      marker.setAttribute('cx', point.x);
      marker.setAttribute('cy', point.y);
      nodes.forEach((node, index) => node.style.opacity = progress >= index / (nodes.length - 1) - .03 ? '1' : '.25');
      requestAnimationFrame(update);
    }
    update();
  }
</script>
</body>
</html>
