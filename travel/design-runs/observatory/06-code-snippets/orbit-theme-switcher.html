<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Orbit Theme Switcher</title>
<style>
  :root{
    --bg:#06101d;
    --panel:rgba(255,255,255,.065);
    --line:rgba(255,255,255,.18);
    --text:#f8f1e7;
    --muted:rgba(248,241,231,.64);
    --blue:#8fd7ff;
    --terra:#c66b43;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    min-height:100svh;
    display:grid;
    place-items:center;
    background:
      radial-gradient(circle at 50% 50%, rgba(143,215,255,.12), transparent 24rem),
      var(--bg);
    color:var(--text);
    font-family:Inter,system-ui,sans-serif;
    padding:28px;
  }
  .switcher{
    width:min(920px,100%);
    border:1px solid var(--line);
    border-radius:18px;
    padding:24px;
    background:var(--panel);
    backdrop-filter:blur(16px);
  }
  .top{
    display:flex;
    justify-content:space-between;
    align-items:end;
    gap:20px;
    margin-bottom:22px;
  }
  h1{margin:0;font-size:clamp(30px,5vw,58px);line-height:.95;letter-spacing:0}
  .active-label{color:var(--muted);font-size:13px;letter-spacing:.14em;text-transform:uppercase}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .theme{
    position:relative;
    min-height:210px;
    text-align:left;
    color:var(--text);
    border:1px solid var(--line);
    border-radius:14px;
    background:rgba(0,0,0,.2);
    padding:18px;
    overflow:hidden;
    cursor:pointer;
  }
  .theme[aria-pressed="true"]{border-color:var(--blue);box-shadow:0 0 0 1px var(--blue),0 0 50px rgba(143,215,255,.12)}
  .theme[disabled]{opacity:.48;cursor:not-allowed}
  .theme:before{
    content:"";
    position:absolute;
    width:180px;
    aspect-ratio:1;
    right:-60px;
    top:-40px;
    border:1px solid rgba(255,255,255,.18);
    border-radius:50%;
  }
  .theme:after{
    content:"";
    position:absolute;
    width:16px;
    height:16px;
    right:74px;
    top:44px;
    border-radius:50%;
    background:var(--blue);
    box-shadow:0 0 18px var(--blue);
    transform-origin:-52px 48px;
  }
  .theme.poland:after{background:var(--terra);box-shadow:0 0 18px var(--terra)}
  .theme.paris:after{background:#a7a4b8;box-shadow:none}
  @media (prefers-reduced-motion:no-preference){
    .theme[aria-pressed="true"]:after{animation:orbit 5s linear infinite}
  }
  @keyframes orbit{to{transform:rotate(1turn)}}
  .status{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--blue)}
  .poland .status{color:var(--terra)}
  .paris .status{color:var(--muted)}
  h2{position:relative;margin:42px 0 8px;font-size:28px;letter-spacing:0}
  p{position:relative;margin:0;color:var(--muted);line-height:1.55}
  @media(max-width:760px){.grid{grid-template-columns:1fr}.top{display:block}.active-label{margin-top:12px}}
</style>
</head>
<body>
<main class="switcher">
  <div class="top">
    <h1>Destination orbit</h1>
    <div class="active-label">Default: <span id="activeName">Observatory</span></div>
  </div>
  <div class="grid" role="group" aria-label="Destination theme switcher">
    <button class="theme observatory" data-theme="observatory" aria-pressed="true">
      <span class="status">Default · live</span>
      <h2>Observatory</h2>
      <p>Fall night, telescope anchor, sky-status planning.</p>
    </button>
    <button class="theme poland" data-theme="poland" aria-pressed="false">
      <span class="status">Previous · selectable</span>
      <h2>Poland</h2>
      <p>Preserved route-line road-trip design. Do not delete.</p>
    </button>
    <button class="theme paris" data-theme="paris" aria-pressed="false" disabled>
      <span class="status">Locked · future</span>
      <h2>Paris</h2>
      <p>Visible but inactive until its own design run.</p>
    </button>
  </div>
</main>
<script>
  const buttons = [...document.querySelectorAll('.theme:not([disabled])')];
  const activeName = document.getElementById('activeName');
  buttons.forEach(button => {
    button.addEventListener('click', () => {
      buttons.forEach(next => next.setAttribute('aria-pressed', 'false'));
      button.setAttribute('aria-pressed', 'true');
      activeName.textContent = button.querySelector('h2').textContent;
      localStorage.setItem('wtc-theme', button.dataset.theme);
    });
  });
  const saved = localStorage.getItem('wtc-theme');
  const savedButton = buttons.find(button => button.dataset.theme === saved);
  if (savedButton) savedButton.click();
</script>
</body>
</html>
