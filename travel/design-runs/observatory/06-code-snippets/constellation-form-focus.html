<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Constellation Form Focus</title>
<style>
  :root{--bg:#06101d;--panel:#0d1a2c;--text:#f8f1e7;--muted:rgba(248,241,231,.65);--line:rgba(248,241,231,.16);--sky:#8fd7ff}
  *{box-sizing:border-box} body{margin:0;min-height:100svh;display:grid;place-items:center;background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;padding:28px}
  form{width:min(620px,100%);background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:24px} h1{font-size:clamp(34px,6vw,74px);line-height:.92;margin:0 0 24px;letter-spacing:0}
  .field{position:relative;margin:22px 0}.field label{display:block;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.14em;margin-bottom:8px}.field input,.field textarea{width:100%;background:#07111f;border:1px solid var(--line);border-radius:10px;color:var(--text);padding:14px;font:inherit}
  .field svg{position:absolute;left:0;right:0;bottom:-8px;width:100%;height:18px;overflow:visible}.line{fill:none;stroke:var(--sky);stroke-width:2;stroke-dasharray:1;stroke-dashoffset:1;transition:stroke-dashoffset .45s ease}.dot{fill:var(--sky);opacity:0;transition:opacity .2s}
  .field:focus-within .line{stroke-dashoffset:0}.field:focus-within .dot{opacity:1}button{margin-top:10px;border:0;border-radius:999px;background:var(--sky);padding:13px 18px;color:#06101d;font-weight:700}
</style>
</head>
<body>
<form>
  <h1>Join the night run</h1>
  <div class="field"><label>Name</label><input placeholder="Mantas"><svg viewBox="0 0 500 20"><path class="line" pathLength="1" d="M2 12 L130 12 L152 4 L178 12 L498 12"/><circle class="dot" cx="152" cy="4" r="3"/></svg></div>
  <div class="field"><label>Availability notes</label><textarea placeholder="September/October Saturdays..."></textarea><svg viewBox="0 0 500 20"><path class="line" pathLength="1" d="M2 12 L210 12 L238 4 L270 12 L498 12"/><circle class="dot" cx="238" cy="4" r="3"/></svg></div>
  <button type="button">Add me</button>
</form>
</body>
</html>
