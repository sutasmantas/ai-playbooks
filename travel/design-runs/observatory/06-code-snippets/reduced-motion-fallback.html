<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reduced Motion Fallback Pattern</title>
<style>
  :root{--bg:#06101d;--text:#f8f1e7;--muted:rgba(248,241,231,.65);--sky:#8fd7ff}
  body{margin:0;min-height:100svh;display:grid;place-items:center;background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;padding:28px}.hero{position:relative;width:min(900px,100%);padding:36px;border:1px solid rgba(248,241,231,.14);border-radius:16px;overflow:hidden;background:radial-gradient(circle at 70% 25%,rgba(143,215,255,.2),transparent 20rem),#0d1a2c}.moving-stars{position:absolute;inset:0;background-image:radial-gradient(1px 1px at 20% 30%,#fff,transparent),radial-gradient(1px 1px at 70% 20%,#fff,transparent);opacity:.55}.content{position:relative;z-index:1}h1{font-size:clamp(40px,7vw,92px);line-height:.9;letter-spacing:0;margin:0 0 18px}p{color:var(--muted);line-height:1.6;font-size:20px}
  @media(prefers-reduced-motion:no-preference){.moving-stars{animation:drift 18s linear infinite}@keyframes drift{to{transform:translate(120px,80px)}}}
  @media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}.moving-stars{animation:none;opacity:.35}.motion-note:before{content:"Reduced motion fallback active: ";color:var(--sky);font-weight:700}}
</style>
</head>
<body><section class="hero"><div class="moving-stars"></div><div class="content"><h1>Same concept, less motion</h1><p class="motion-note">Keep the Observatory mood with static stars, visible route state, and normal fades.</p></div></section></body>
</html>
