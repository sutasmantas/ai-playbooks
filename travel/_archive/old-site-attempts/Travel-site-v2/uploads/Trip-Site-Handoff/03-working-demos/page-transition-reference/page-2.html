<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page transition — reference · Poland</title>
<style>
  :root{--forest:#1f3328;--terra:#c0613f;--paper:#f3ede1;--paper-soft:#cdbfa8;--ease:cubic-bezier(.785,.135,.15,.86);}
  *{box-sizing:border-box;margin:0;}
  html,body{background:var(--forest);color:var(--paper);font-family:"Hanken Grotesk",system-ui,sans-serif;}
  .panel{min-height:100svh;display:flex;flex-direction:column;justify-content:center;padding:0 32px;max-width:1000px;margin:0 auto;}
  .eyebrow{font:600 .72rem/1 ui-monospace,monospace;letter-spacing:.22em;text-transform:uppercase;color:#d98c5f;}
  h1{font-size:clamp(2.6rem,8vw,6rem);font-weight:650;letter-spacing:-.02em;margin-top:16px;}
  p{margin-top:20px;max-width:46ch;color:var(--paper-soft);font-size:1.15rem;}
  .go{display:inline-flex;margin-top:36px;border:1px solid var(--terra);border-radius:100px;padding:15px 28px;
    color:var(--paper);text-decoration:none;font-weight:600;gap:10px;}
  .transition{position:fixed;inset:0;background:var(--terra);z-index:9999;visibility:hidden;
    display:flex;align-items:center;justify-content:center;}
  .transition .mark{font:600 1.1rem/1 ui-monospace,monospace;letter-spacing:.18em;color:var(--forest);text-transform:uppercase;}
</style>
</head>
<body>
<div class="transition" id="trans"><span class="mark">Where To, Crew?</span></div>

<section class="panel">
  <p class="eyebrow">Page 2 · Poland</p>
  <h1>Next stop: Kraków.</h1>
  <p>You arrived under the panel — it revealed this page by sliding up and away. Go back and the same motion plays again. One reused transition = a crafted, SPA-like feel on a plain multi-page site.</p>
  <a class="go" href="index.html" data-transition>← Back home</a>
</section>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lenis@1/dist/lenis.min.js"></script>
<script>
(function(){
  const reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;
  const ov = document.getElementById('trans');
  if(!reduce && window.Lenis){ const l=new Lenis({lerp:.1}); gsap.ticker.add(t=>l.raf(t*1000)); gsap.ticker.lagSmoothing(0); }
  if(!reduce && sessionStorage.getItem('wtc-trans')){
    sessionStorage.removeItem('wtc-trans');
    gsap.set(ov,{yPercent:0, autoAlpha:1});
    gsap.to(ov,{yPercent:-100, duration:.7, ease:'expo.inOut', delay:.05, onComplete:()=>gsap.set(ov,{autoAlpha:0})});
  } else if(!reduce){ gsap.set(ov,{yPercent:100, autoAlpha:1}); }
  document.querySelectorAll('a[data-transition]').forEach(a=>{
    a.addEventListener('click', e=>{
      const href=a.getAttribute('href');
      if(reduce || e.metaKey||e.ctrlKey||a.target==='_blank') return;
      e.preventDefault();
      sessionStorage.setItem('wtc-trans','1');
      gsap.to(ov,{yPercent:0, duration:.6, ease:'expo.inOut', onComplete:()=>{ location.href=href; }});
    });
  });
})();
</script>
</body>
</html>
