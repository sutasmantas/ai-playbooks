<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Energylandia Trip</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg: #f5f3ee;
      --card: #ffffff;
      --ink: #1a1a1a;
      --muted: #6b6b6b;
      --accent: #d96941;
      --good: #2a7a3a;
      --line: #e5e1d8;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
      margin: 0;
      padding: 24px 16px;
      line-height: 1.5;
    }
    .wrap { max-width: 760px; margin: 0 auto; }
    h1 { margin: 0 0 4px; font-size: 28px; }
    .sub { color: var(--muted); margin-bottom: 24px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .hint { font-size: 12px; color: var(--muted); font-weight: 400; }
    input[type=text], input[type=number], textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      background: #fff;
    }
    input:focus, textarea:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
    .field { margin-bottom: 16px; }

    /* Going? chips */
    .going { display: flex; gap: 8px; flex-wrap: wrap; }
    .going .opt {
      flex: 1;
      min-width: 100px;
      text-align: center;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      cursor: pointer;
      background: #fff;
      font-weight: 500;
    }
    .going .opt input { display: none; }
    .going .opt.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* Calendar */
    .cal-controls {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .cal-btn {
      background: #fff; border: 1px solid var(--line); border-radius: 6px;
      padding: 6px 10px; cursor: pointer; font-size: 14px;
    }
    .cal-btn:hover { background: var(--bg); }
    .cal-month { font-weight: 600; }
    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
    }
    .cal-dow {
      text-align: center; font-size: 11px; color: var(--muted);
      padding: 4px 0; font-weight: 600; text-transform: uppercase;
    }
    .cal-day {
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--line); border-radius: 6px;
      cursor: pointer; user-select: none; font-size: 14px;
      background: #fff; position: relative;
    }
    .cal-day:hover { background: var(--bg); }
    .cal-day.selected { background: var(--accent); color: #fff; border-color: var(--accent); }
    .cal-day.empty { visibility: hidden; }
    .cal-day.past { opacity: 0.35; cursor: not-allowed; }
    .cal-day.past:hover { background: #fff; }
    .cal-day .dot {
      position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%);
      width: 4px; height: 4px; border-radius: 50%; background: var(--good);
    }
    .cal-day.selected .dot { background: #fff; }
    .cal-summary { font-size: 13px; color: var(--muted); margin-top: 8px; }

    /* Map */
    #map { height: 360px; border-radius: 8px; border: 1px solid var(--line); }
    .map-help { font-size: 12px; color: var(--muted); margin-top: 8px; }
    .stops-list { margin-top: 8px; font-size: 13px; }
    .stop-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 4px 0; border-bottom: 1px dashed var(--line);
    }
    .stop-row:last-child { border-bottom: 0; }
    .remove-stop {
      background: transparent; border: 0; color: var(--accent);
      cursor: pointer; font-size: 13px;
    }

    /* Group summary card */
    .group-card { border-color: var(--accent); }
    .stats {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
      margin-bottom: 12px;
    }
    .stat {
      text-align: center; padding: 10px; background: var(--bg); border-radius: 8px;
    }
    .stat .num { font-size: 22px; font-weight: 700; color: var(--accent); display: block; }
    .stat .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; }
    .group-section { margin-top: 10px; }
    .group-title { font-size: 12px; font-weight: 600; color: var(--muted);
                   text-transform: uppercase; margin-bottom: 6px; }
    .group-body { display: flex; flex-wrap: wrap; gap: 6px; font-size: 13px; }
    .pop-pill {
      background: var(--bg); border: 1px solid var(--line); border-radius: 999px;
      padding: 3px 10px; font-size: 12px;
    }
    .pop-pill b { color: var(--accent); font-weight: 700; margin-left: 4px; }

    /* Vibe chips */
    .vibes { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      display: inline-flex; align-items: center;
      padding: 6px 12px;
      border: 1px solid var(--line); border-radius: 999px;
      cursor: pointer; user-select: none;
      font-size: 14px; background: #fff;
    }
    .chip input { display: none; }
    .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* Activity ideas */
    .act-row { display: flex; gap: 8px; }
    .act-row input { flex: 1; }
    .add-btn {
      background: var(--ink); color: #fff; border: 0;
      padding: 0 16px; border-radius: 8px; cursor: pointer;
      font-weight: 600; font-size: 14px;
    }
    .add-btn:hover { background: var(--accent); }
    .act-list { margin-top: 10px; display: flex; flex-direction: column; gap: 4px; }
    .act-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 10px; background: var(--bg); border-radius: 6px;
      font-size: 14px;
    }
    .act-item button {
      background: transparent; border: 0; color: var(--accent);
      cursor: pointer; font-size: 13px;
    }
    .act-others { margin-top: 14px; padding-top: 12px; border-top: 1px dashed var(--line); }
    .act-others-title { font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
    .act-other {
      font-size: 13px; padding: 3px 0; color: var(--ink);
    }
    .act-other .by { color: var(--muted); font-size: 11px; margin-left: 6px; }

    /* Submit */
    button.submit {
      background: var(--ink); color: #fff; border: 0;
      padding: 12px 20px; border-radius: 8px;
      font-size: 15px; font-weight: 600; cursor: pointer; width: 100%;
    }
    button.submit:hover { background: var(--accent); }
    button.submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .status { margin-top: 12px; font-size: 14px; }
    .status.ok { color: var(--good); }
    .status.err { color: #b54040; }

    /* Who's in summary */
    .roster { font-size: 14px; }
    .roster .person { padding: 4px 0; border-bottom: 1px dashed var(--line); }
    .roster .person:last-child { border-bottom: 0; }
    .badge {
      display: inline-block; padding: 1px 8px; border-radius: 999px;
      font-size: 11px; font-weight: 600; margin-left: 6px;
    }
    .badge.go { background: #d6efd9; color: #2a7a3a; }
    .badge.maybe { background: #fde8a8; color: #8a6a00; }
    .badge.no { background: #f5d5d5; color: #b54040; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Energylandia Trip</h1>
    <div class="sub">Let us know if you're in, when you're free, and any stops you'd like to make along the way.</div>

    <div class="card group-card" id="groupCard" style="display:none;">
      <label>Group so far</label>
      <div class="stats" id="stats"></div>
      <div class="group-section" id="groupDays" style="display:none;">
        <div class="group-title">Most popular days</div>
        <div class="group-body" id="groupDaysBody"></div>
      </div>
      <div class="group-section" id="groupVibes" style="display:none;">
        <div class="group-title">Top vibes</div>
        <div class="group-body" id="groupVibesBody"></div>
      </div>
      <div class="group-section" id="groupLen" style="display:none;">
        <div class="group-title">Preferred trip length</div>
        <div class="group-body" id="groupLenBody"></div>
      </div>
    </div>

    <form id="form" onsubmit="return false;">
      <div class="card">
        <div class="field">
          <label>Your name</label>
          <input type="text" id="name" required>
        </div>
        <div class="field">
          <label>Are you coming?</label>
          <div class="going" id="going">
            <label class="opt"><input type="radio" name="going" value="Yes">I'm in</label>
            <label class="opt"><input type="radio" name="going" value="Maybe">Maybe</label>
            <label class="opt"><input type="radio" name="going" value="No">Can't make it</label>
          </div>
        </div>
      </div>

      <div class="card">
        <label>When are you available? <span class="hint">click or drag across days</span></label>
        <div class="cal-controls">
          <button type="button" class="cal-btn" id="calPrev">‹ Prev</button>
          <div class="cal-month" id="calMonth"></div>
          <button type="button" class="cal-btn" id="calNext">Next ›</button>
        </div>
        <div class="cal-grid" id="calDow"></div>
        <div class="cal-grid" id="calGrid" style="margin-top:4px;"></div>
        <div class="cal-summary" id="calSummary">No days selected yet.</div>
      </div>

      <div class="card">
        <label>Stops along the way <span class="hint">click the map to add a pin, click a pin to remove it</span></label>
        <div id="map"></div>
        <div class="map-help">Red star = Energylandia (our destination). Click anywhere to add a suggested stop.</div>
        <div class="stops-list" id="stopsList"></div>
      </div>

      <div class="card">
        <label>Trip vibe <span class="hint">(pick any that fit)</span></label>
        <div class="vibes" id="vibes">
          <label class="chip"><input type="checkbox" value="Thrill rides">Thrill rides</label>
          <label class="chip"><input type="checkbox" value="Water park">Water park</label>
          <label class="chip"><input type="checkbox" value="Chill">Chill</label>
          <label class="chip"><input type="checkbox" value="Party">Party</label>
          <label class="chip"><input type="checkbox" value="Foodie">Foodie</label>
          <label class="chip"><input type="checkbox" value="Photo spots">Photo spots</label>
          <label class="chip"><input type="checkbox" value="Budget mode">Budget mode</label>
          <label class="chip"><input type="checkbox" value="Splurge">Splurge</label>
          <label class="chip"><input type="checkbox" value="Stay overnight">Stay overnight</label>
          <label class="chip"><input type="checkbox" value="Day trip only">Day trip only</label>
          <label class="chip"><input type="checkbox" value="Adventure">Adventure</label>
          <label class="chip"><input type="checkbox" value="Sightseeing">Sightseeing</label>
          <label class="chip"><input type="checkbox" value="Drinks/bar">Drinks/bar</label>
          <label class="chip"><input type="checkbox" value="No drinking">No drinking</label>
          <label class="chip"><input type="checkbox" value="Cook together">Cook together</label>
          <label class="chip"><input type="checkbox" value="Restaurants">Restaurants</label>
          <label class="chip"><input type="checkbox" value="Late nights">Late nights</label>
          <label class="chip"><input type="checkbox" value="Early starts">Early starts</label>
          <label class="chip"><input type="checkbox" value="Spa/wellness">Spa/wellness</label>
          <label class="chip"><input type="checkbox" value="Escape rooms">Escape rooms</label>
          <label class="chip"><input type="checkbox" value="Karting">Karting</label>
          <label class="chip"><input type="checkbox" value="Kraków stop">Kraków stop</label>
          <label class="chip"><input type="checkbox" value="Salt mine">Salt mine</label>
          <label class="chip"><input type="checkbox" value="Group photos">Group photos</label>
          <label class="chip"><input type="checkbox" value="Games at hotel">Games at hotel</label>
        </div>
      </div>

      <div class="card">
        <label>How long should the trip be?</label>
        <div class="going" id="tripLen">
          <label class="opt"><input type="radio" name="tripLen" value="1">1 day</label>
          <label class="opt"><input type="radio" name="tripLen" value="2">2 days</label>
          <label class="opt"><input type="radio" name="tripLen" value="3">3 days</label>
          <label class="opt"><input type="radio" name="tripLen" value="4">4 days</label>
          <label class="opt"><input type="radio" name="tripLen" value="5+">5+ days</label>
        </div>
      </div>

      <div class="card">
        <label>Activity ideas <span class="hint">(anything you'd like us to do)</span></label>
        <div class="act-row">
          <input type="text" id="actInput" placeholder="e.g. ride the Hyperion, BBQ at hotel, stop in Kraków…" />
          <button type="button" class="add-btn" id="actAdd">Add</button>
        </div>
        <div class="act-list" id="actList"></div>
        <div class="act-others" id="actOthers" style="display:none;">
          <div class="act-others-title">Ideas already suggested:</div>
          <div id="actOthersList"></div>
        </div>
      </div>

      <div class="card">
        <div class="field">
          <label>Budget per person <span class="hint">(optional, just an estimate)</span></label>
          <input type="number" id="budget" min="0" step="50">
        </div>
        <div class="field">
          <label>Notes</label>
          <textarea id="notes" rows="3"></textarea>
        </div>
      </div>

      <button class="submit" id="submitBtn" onclick="submitForm()">Submit</button>
      <div class="status" id="status"></div>
    </form>

    <div class="card" id="rosterCard" style="display:none;">
      <label>Who's responded so far</label>
      <div class="roster" id="roster"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    /* ---------- Calendar ---------- */
    const today = new Date(); today.setHours(0,0,0,0);
    let viewYear = today.getFullYear();
    let viewMonth = today.getMonth();
    const selectedDays = new Set();   // ISO strings: "2026-06-12"
    const othersDays = new Map();     // ISO -> count of others available

    const DOW = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const MONTHS = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];

    function isoDate(y, m, d) {
      return y + '-' + String(m+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    }

    function renderDow() {
      const el = document.getElementById('calDow');
      el.innerHTML = '';
      DOW.forEach(d => {
        const c = document.createElement('div');
        c.className = 'cal-dow'; c.textContent = d;
        el.appendChild(c);
      });
    }

    // Drag-select state
    let dragging = false;
    let dragMode = null; // 'select' or 'deselect'

    function applyDrag(cell) {
      if (!cell || !cell.classList.contains('cal-day')) return;
      if (cell.classList.contains('past') || cell.classList.contains('empty')) return;
      const iso = cell.dataset.iso;
      if (!iso) return;
      if (dragMode === 'select' && !selectedDays.has(iso)) {
        selectedDays.add(iso);
        cell.classList.add('selected');
      } else if (dragMode === 'deselect' && selectedDays.has(iso)) {
        selectedDays.delete(iso);
        cell.classList.remove('selected');
      }
      updateCalSummary();
    }

    function renderCalendar() {
      document.getElementById('calMonth').textContent =
        MONTHS[viewMonth] + ' ' + viewYear;
      const grid = document.getElementById('calGrid');
      grid.innerHTML = '';
      const first = new Date(viewYear, viewMonth, 1);
      // Mon=0..Sun=6
      let startDow = first.getDay() - 1; if (startDow < 0) startDow = 6;
      const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();

      for (let i = 0; i < startDow; i++) {
        const e = document.createElement('div');
        e.className = 'cal-day empty';
        grid.appendChild(e);
      }
      for (let d = 1; d <= daysInMonth; d++) {
        const iso = isoDate(viewYear, viewMonth, d);
        const cell = document.createElement('div');
        cell.className = 'cal-day';
        cell.textContent = d;
        cell.dataset.iso = iso;
        const cellDate = new Date(viewYear, viewMonth, d);
        if (cellDate < today) cell.classList.add('past');
        if (selectedDays.has(iso)) cell.classList.add('selected');
        if (othersDays.get(iso)) {
          const dot = document.createElement('span');
          dot.className = 'dot';
          dot.title = othersDays.get(iso) + ' other(s) available';
          cell.appendChild(dot);
        }

        cell.addEventListener('mousedown', (e) => {
          if (cell.classList.contains('past')) return;
          e.preventDefault();
          dragging = true;
          dragMode = selectedDays.has(iso) ? 'deselect' : 'select';
          applyDrag(cell);
        });
        cell.addEventListener('mouseenter', () => {
          if (dragging) applyDrag(cell);
        });

        grid.appendChild(cell);
      }
    }

    // Global mouseup ends the drag
    document.addEventListener('mouseup', () => { dragging = false; dragMode = null; });
    document.addEventListener('mouseleave', () => { dragging = false; dragMode = null; });

    // Touch: drag with finger across days
    function touchPaint(e) {
      const t = e.touches[0]; if (!t) return;
      const el = document.elementFromPoint(t.clientX, t.clientY);
      if (el) applyDrag(el);
    }
    document.getElementById('calGrid').addEventListener('touchstart', (e) => {
      const cell = e.target.closest('.cal-day');
      if (!cell || cell.classList.contains('past') || cell.classList.contains('empty')) return;
      e.preventDefault();
      dragging = true;
      const iso = cell.dataset.iso;
      dragMode = selectedDays.has(iso) ? 'deselect' : 'select';
      applyDrag(cell);
    }, { passive: false });
    document.getElementById('calGrid').addEventListener('touchmove', (e) => {
      if (!dragging) return;
      e.preventDefault();
      touchPaint(e);
    }, { passive: false });
    document.addEventListener('touchend', () => { dragging = false; dragMode = null; });

    function updateCalSummary() {
      const n = selectedDays.size;
      const el = document.getElementById('calSummary');
      if (!n) { el.textContent = 'No days selected yet.'; return; }
      const sorted = [...selectedDays].sort();
      const preview = sorted.slice(0, 5).map(s => {
        const [y,m,d] = s.split('-');
        return MONTHS[+m-1].slice(0,3) + ' ' + (+d);
      }).join(', ');
      el.textContent = n + ' day' + (n===1?'':'s') + ' selected: ' +
                       preview + (sorted.length > 5 ? '…' : '');
    }

    document.getElementById('calPrev').addEventListener('click', () => {
      viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; }
      renderCalendar();
    });
    document.getElementById('calNext').addEventListener('click', () => {
      viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; }
      renderCalendar();
    });

    renderDow();
    renderCalendar();

    /* ---------- "Going" chips ---------- */
    document.getElementById('going').addEventListener('change', (e) => {
      document.querySelectorAll('#going .opt').forEach(o => o.classList.remove('active'));
      e.target.closest('.opt').classList.add('active');
    });

    /* ---------- Vibe chips ---------- */
    document.getElementById('vibes').addEventListener('change', (e) => {
      e.target.closest('.chip').classList.toggle('active', e.target.checked);
    });

    /* ---------- Trip length pills ---------- */
    document.getElementById('tripLen').addEventListener('change', (e) => {
      document.querySelectorAll('#tripLen .opt').forEach(o => o.classList.remove('active'));
      e.target.closest('.opt').classList.add('active');
    });

    /* ---------- Activity ideas ---------- */
    const myActivities = [];
    function renderActList() {
      const el = document.getElementById('actList');
      el.innerHTML = myActivities.map((a, i) =>
        '<div class="act-item"><span>' + escapeHtml(a) + '</span>' +
        '<button type="button" data-i="' + i + '">remove</button></div>'
      ).join('');
      el.querySelectorAll('button').forEach(b => {
        b.addEventListener('click', () => {
          myActivities.splice(+b.dataset.i, 1);
          renderActList();
        });
      });
    }
    function addActivity() {
      const input = document.getElementById('actInput');
      const v = input.value.trim();
      if (!v) return;
      myActivities.push(v);
      input.value = '';
      renderActList();
      input.focus();
    }
    document.getElementById('actAdd').addEventListener('click', addActivity);
    document.getElementById('actInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); addActivity(); }
    });

    /* ---------- Map ---------- */
    const ENERGYLANDIA = { lat: 49.9881, lng: 19.4569, label: 'Energylandia, Zator, Poland' };
    let map;
    const myStops = []; // {lat, lng, label, marker}

    function initMap() {
      map = L.map('map').setView([ENERGYLANDIA.lat, ENERGYLANDIA.lng], 6);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap', maxZoom: 18
      }).addTo(map);

      // Fixed destination marker
      const star = L.divIcon({
        className: '',
        html: '<div style="font-size:28px;line-height:1;text-shadow:0 0 3px #fff;">⭐</div>',
        iconSize: [28, 28], iconAnchor: [14, 14]
      });
      L.marker([ENERGYLANDIA.lat, ENERGYLANDIA.lng], { icon: star })
        .addTo(map)
        .bindPopup('<b>Energylandia</b><br>Our destination');

      map.on('click', async (e) => {
        addStop(e.latlng.lat, e.latlng.lng);
      });

      google.script.run.withSuccessHandler(handleResponses).getResponses();
    }

    function addStop(lat, lng) {
      const marker = L.marker([lat, lng]).addTo(map);
      const stop = { lat, lng, label: 'Looking up…', marker };
      myStops.push(stop);
      marker.bindPopup(stop.label);
      marker.on('click', () => removeStop(stop));
      renderStopsList();
      reverseGeocode(lat, lng).then(label => {
        stop.label = label;
        marker.setPopupContent(label);
        renderStopsList();
      });
    }

    function removeStop(stop) {
      map.removeLayer(stop.marker);
      const i = myStops.indexOf(stop);
      if (i >= 0) myStops.splice(i, 1);
      renderStopsList();
    }

    function renderStopsList() {
      const el = document.getElementById('stopsList');
      if (!myStops.length) { el.innerHTML = ''; return; }
      el.innerHTML = '<div style="font-weight:600;margin-bottom:4px;">Your suggested stops:</div>' +
        myStops.map((s, i) =>
          '<div class="stop-row"><span>' + escapeHtml(s.label) + '</span>' +
          '<button type="button" class="remove-stop" data-i="' + i + '">remove</button></div>'
        ).join('');
      el.querySelectorAll('.remove-stop').forEach(b => {
        b.addEventListener('click', () => removeStop(myStops[+b.dataset.i]));
      });
    }

    async function reverseGeocode(lat, lng) {
      try {
        const url = 'https://nominatim.openstreetmap.org/reverse?format=json&lat=' +
                    lat + '&lon=' + lng + '&zoom=10';
        const r = await fetch(url, { headers: { 'Accept-Language': 'en' } });
        const j = await r.json();
        return j.display_name || (lat.toFixed(3) + ', ' + lng.toFixed(3));
      } catch (e) {
        return lat.toFixed(3) + ', ' + lng.toFixed(3);
      }
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }

    /* ---------- Group summary ---------- */
    function renderGroupSummary(rows) {
      document.getElementById('groupCard').style.display = '';
      const inCount = rows.filter(r => r.going === 'Yes').length;
      const maybeCount = rows.filter(r => r.going === 'Maybe').length;
      const outCount = rows.filter(r => r.going === 'No').length;

      document.getElementById('stats').innerHTML =
        '<div class="stat"><span class="num">' + inCount + '</span><span class="lbl">In</span></div>' +
        '<div class="stat"><span class="num">' + maybeCount + '</span><span class="lbl">Maybe</span></div>' +
        '<div class="stat"><span class="num">' + outCount + '</span><span class="lbl">Out</span></div>';

      // Top days (only count people who are In or Maybe)
      const dayCounts = new Map();
      const dayNames = new Map();
      rows.forEach(r => {
        if (r.going === 'No') return;
        (r.availableDays || []).forEach(iso => {
          dayCounts.set(iso, (dayCounts.get(iso) || 0) + 1);
          if (!dayNames.has(iso)) dayNames.set(iso, []);
          dayNames.get(iso).push(r.name);
        });
      });
      const sortedDays = [...dayCounts.entries()].sort((a,b) => b[1]-a[1]).slice(0, 6);
      if (sortedDays.length) {
        document.getElementById('groupDays').style.display = '';
        document.getElementById('groupDaysBody').innerHTML = sortedDays.map(([iso, n]) => {
          const [y,m,d] = iso.split('-');
          const label = MONTHS[+m-1].slice(0,3) + ' ' + (+d);
          const who = (dayNames.get(iso) || []).join(', ');
          return '<span class="pop-pill" title="' + escapeHtml(who) + '">' +
                 escapeHtml(label) + ' <b>' + n + '</b></span>';
        }).join('');
      }

      // Top vibes
      const vibeCounts = new Map();
      rows.forEach(r => (r.vibes || []).forEach(v => {
        vibeCounts.set(v, (vibeCounts.get(v) || 0) + 1);
      }));
      const sortedVibes = [...vibeCounts.entries()].sort((a,b) => b[1]-a[1]).slice(0, 8);
      if (sortedVibes.length) {
        document.getElementById('groupVibes').style.display = '';
        document.getElementById('groupVibesBody').innerHTML = sortedVibes.map(([v, n]) =>
          '<span class="pop-pill">' + escapeHtml(v) + ' <b>' + n + '</b></span>'
        ).join('');
      }

      // Trip length preference
      const lenCounts = new Map();
      rows.forEach(r => {
        if (r.tripLength) lenCounts.set(r.tripLength, (lenCounts.get(r.tripLength) || 0) + 1);
      });
      const sortedLen = [...lenCounts.entries()].sort((a,b) => b[1]-a[1]);
      if (sortedLen.length) {
        document.getElementById('groupLen').style.display = '';
        document.getElementById('groupLenBody').innerHTML = sortedLen.map(([l, n]) =>
          '<span class="pop-pill">' + escapeHtml(l) + (l === '5+' ? ' days' : (l === '1' ? ' day' : ' days')) +
          ' <b>' + n + '</b></span>'
        ).join('');
      }
    }

    /* ---------- Show other people's data ---------- */
    function handleResponses(rows) {
      if (!rows || !rows.length) return;

      renderGroupSummary(rows);

      // Build othersDays map for calendar dots
      rows.forEach(r => {
        if (r.going === 'No') return;
        (r.availableDays || []).forEach(iso => {
          othersDays.set(iso, (othersDays.get(iso) || 0) + 1);
        });
      });
      renderCalendar();

      // Drop circles for others' stops
      rows.forEach(r => {
        (r.stops || []).forEach(s => {
          if (!s.lat || !s.lng) return;
          L.circleMarker([s.lat, s.lng], {
            radius: 6, color: '#d96941', fillColor: '#d96941', fillOpacity: 0.5
          }).bindPopup('<b>' + escapeHtml(r.name) + '</b> suggested:<br>' +
                       escapeHtml(s.label || '')).addTo(map);
        });
      });

      // Activity ideas from others
      const others = [];
      rows.forEach(r => {
        (r.activities || []).forEach(a => others.push({ name: r.name, idea: a }));
      });
      if (others.length) {
        document.getElementById('actOthers').style.display = '';
        document.getElementById('actOthersList').innerHTML = others.map(o =>
          '<div class="act-other">• ' + escapeHtml(o.idea) +
          '<span class="by">— ' + escapeHtml(o.name) + '</span></div>'
        ).join('');
      }

      // Roster
      const roster = document.getElementById('roster');
      document.getElementById('rosterCard').style.display = '';
      roster.innerHTML = rows.map(r => {
        const cls = r.going === 'Yes' ? 'go' : r.going === 'Maybe' ? 'maybe' : 'no';
        const text = r.going === 'Yes' ? "I'm in" : r.going === 'Maybe' ? 'Maybe' : "Can't make it";
        const days = (r.availableDays || []).length;
        return '<div class="person"><b>' + escapeHtml(r.name) + '</b>' +
               '<span class="badge ' + cls + '">' + text + '</span>' +
               (days ? ' <span class="hint">· ' + days + ' day' + (days===1?'':'s') + ' available</span>' : '') +
               '</div>';
      }).join('');
    }

    /* ---------- Submit ---------- */
    function submitForm() {
      const status = document.getElementById('status');
      const btn = document.getElementById('submitBtn');
      status.textContent = '';
      status.className = 'status';

      const name = document.getElementById('name').value.trim();
      const goingEl = document.querySelector('#going input:checked');
      if (!name) { return fail('Please enter your name.'); }
      if (!goingEl) { return fail("Please pick whether you're coming."); }

      const going = goingEl.value;
      const vibes = Array.from(document.querySelectorAll('#vibes input:checked'))
                         .map(i => i.value);
      const tripLenEl = document.querySelector('#tripLen input:checked');
      const payload = {
        name,
        going,
        availableDays: [...selectedDays].sort(),
        stops: myStops.map(s => ({ lat: s.lat, lng: s.lng, label: s.label })),
        vibes,
        activities: myActivities.slice(),
        tripLength: tripLenEl ? tripLenEl.value : '',
        budget: document.getElementById('budget').value,
        notes: document.getElementById('notes').value.trim()
      };

      btn.disabled = true;
      btn.textContent = 'Submitting…';

      google.script.run
        .withSuccessHandler(() => {
          status.textContent = 'Thanks! Your response was saved.';
          status.classList.add('ok');
          btn.textContent = 'Submitted';
        })
        .withFailureHandler((err) => {
          status.textContent = 'Error: ' + err.message;
          status.classList.add('err');
          btn.disabled = false;
          btn.textContent = 'Submit';
        })
        .submitResponse(payload);

      function fail(msg) {
        status.textContent = msg;
        status.classList.add('err');
        btn.disabled = false;
      }
    }

    initMap();
  </script>
</body>
</html>
