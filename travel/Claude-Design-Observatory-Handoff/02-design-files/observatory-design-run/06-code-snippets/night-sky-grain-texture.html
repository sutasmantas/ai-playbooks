<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Night Sky Grain Texture</title>
<style>
  :root{--text:#f8f1e7;--muted:rgba(248,241,231,.67);--sky:#8fd7ff}
  body{margin:0;min-height:100svh;display:grid;place-items:center;color:var(--text);font-family:Inter,system-ui,sans-serif;background:#06101d;overflow:hidden}
  .sky{position:fixed;inset:0;background:radial-gradient(circle at 72% 20%,rgba(143,215,255,.2),transparent 24rem),radial-gradient(circle at 18% 78%,rgba(216,161,95,.13),transparent 22rem),linear-gradient(145deg,#081a31,#030712 70%)}
  .sky:after{content:"";position:absolute;inset:0;opacity:.16;mix-blend-mode:screen;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='220' height='220' filter='url(%23n)' opacity='.55'/%3E%3C/svg%3E")}
  .stars{position:fixed;inset:0;background-image:radial-gradient(1px 1px at 10% 22%,#fff,transparent),radial-gradient(1px 1px at 23% 68%,#fff,transparent),radial-gradient(1.4px 1.4px at 54% 34%,#fff,transparent),radial-gradient(1px 1px at 78% 74%,#fff,transparent),radial-gradient(1px 1px at 88% 18%,#fff,transparent);opacity:.72}
  main{position:relative;z-index:2;max-width:760px;padding:36px;text-align:center} h1{font-size:clamp(44px,8vw,110px);line-height:.9;letter-spacing:0;margin:0 0 18px} p{color:var(--muted);line-height:1.7;font-size:20px}
</style>
</head>
<body><div class="sky"></div><div class="stars"></div><main><h1>Readable night sky</h1><p>Use grain and layered radial light sparingly so the UI feels cosmic but text stays readable.</p></main></body>
</html>
