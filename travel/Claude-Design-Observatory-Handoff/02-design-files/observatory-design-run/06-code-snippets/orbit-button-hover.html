<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Orbit Button Hover</title>
<style>
  :root{--bg:#06101d;--text:#f8f1e7;--sky:#8fd7ff}
  body{margin:0;min-height:100svh;display:grid;place-items:center;background:var(--bg);font-family:Inter,system-ui,sans-serif}
  .actions{display:flex;gap:18px;flex-wrap:wrap;justify-content:center}.orbit-btn{position:relative;display:inline-flex;align-items:center;justify-content:center;min-width:180px;padding:15px 22px;border-radius:999px;border:1px solid rgba(248,241,231,.25);color:var(--text);text-decoration:none;overflow:hidden}
  .orbit-btn:before{content:"";position:absolute;width:36px;height:36px;border:1px solid var(--sky);border-radius:50%;left:14px;opacity:.25;transition:width .35s,height .35s,opacity .35s}
  .orbit-btn:after{content:"";position:absolute;width:7px;height:7px;border-radius:50%;background:var(--sky);left:28px;box-shadow:0 0 12px var(--sky);transform-origin:62px 0}
  .orbit-btn span{position:relative;z-index:1}.orbit-btn:hover:before{width:calc(100% - 28px);height:calc(100% - 10px);opacity:.65}@media(prefers-reduced-motion:no-preference){.orbit-btn:hover:after{animation:spin .9s linear infinite}}@keyframes spin{to{transform:rotate(1turn)}}
</style>
</head>
<body><nav class="actions"><a class="orbit-btn" href="#"><span>Plan Observatory</span></a><a class="orbit-btn" href="#"><span>Switch to Poland</span></a></nav></body>
</html>
