<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Parallax Star Cards</title>
<style>
  :root{--bg:#06101d;--card:#0d1a2c;--text:#f8f1e7;--muted:rgba(248,241,231,.65);--line:rgba(248,241,231,.14);--sky:#8fd7ff}
  *{box-sizing:border-box} body{margin:0;min-height:100svh;display:grid;place-items:center;background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;padding:28px}
  .grid{width:min(1000px,100%);display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.card{position:relative;min-height:320px;overflow:hidden;border:1px solid var(--line);border-radius:14px;background:var(--card);padding:20px;display:flex;flex-direction:column;justify-content:end;transform-style:preserve-3d}
  .card:before,.card:after{content:"";position:absolute;inset:-20%;background-image:radial-gradient(1px 1px at 20% 30%,#fff,transparent),radial-gradient(1px 1px at 70% 20%,#fff,transparent),radial-gradient(1.5px 1.5px at 52% 75%,#fff,transparent);transition:transform .35s ease;opacity:.7;transform:translate(calc(var(--x,0) * -18px),calc(var(--y,0) * -18px))}
  .card:after{filter:blur(.5px);opacity:.35;scale:1.4;transform:translate(calc(var(--x,0) * -34px),calc(var(--y,0) * -34px))}.card h2,.card p{position:relative;z-index:2}.card h2{font-size:28px;margin:0 0 8px;letter-spacing:0}.card p{margin:0;color:var(--muted);line-height:1.5}
  .card:hover{border-color:var(--sky)}@media(max-width:760px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<section class="grid">
  <article class="card"><h2>Mindunai tower</h2><p>Close scenic stop before the night anchor.</p></article>
  <article class="card"><h2>Moletai warm-up</h2><p>Dinner and weather-buffer before the telescope.</p></article>
  <article class="card"><h2>80 cm telescope</h2><p>The mandatory Observatory moment.</p></article>
</section>
<script>
  const fine = matchMedia('(hover:hover) and (pointer:fine)').matches;
  if (fine) document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('pointermove', e => {
      const r = card.getBoundingClientRect();
      const x = (e.clientX - r.left) / r.width - .5, y = (e.clientY - r.top) / r.height - .5;
      card.style.transform = `rotateX(${y*-5}deg) rotateY(${x*7}deg)`;
      card.style.setProperty('--x', x);
      card.style.setProperty('--y', y);
    });
    card.addEventListener('pointerleave', () => {
      card.style.transform = '';
      card.style.setProperty('--x', 0);
      card.style.setProperty('--y', 0);
    });
  });
</script>
</body>
</html>
