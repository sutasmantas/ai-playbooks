<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moon Phase Date Widget</title>
<style>
  :root{--bg:#06101d;--panel:#0d1a2c;--text:#f8f1e7;--muted:rgba(248,241,231,.65);--line:rgba(248,241,231,.14);--sky:#8fd7ff;--warn:#facc15}
  *{box-sizing:border-box} body{margin:0;min-height:100svh;display:grid;place-items:center;background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;padding:28px}
  .widget{width:min(760px,100%);display:grid;grid-template-columns:240px 1fr;gap:20px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:22px}
  .moon{width:190px;aspect-ratio:1;border-radius:50%;background:radial-gradient(circle at var(--phase,45%) 50%, #f7f2ea 0 38%, #1d2a3d 40% 100%);box-shadow:0 0 50px rgba(143,215,255,.25);margin:auto}
  label{display:block;color:var(--muted);font-size:12px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px} input{width:100%;padding:12px;border-radius:10px;border:1px solid var(--line);background:#07111f;color:var(--text)}
  h1{margin:16px 0 8px;font-size:clamp(30px,5vw,58px);line-height:1;letter-spacing:0}.quality{display:inline-flex;border:1px solid currentColor;border-radius:999px;padding:7px 10px;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--sky)}
  .quality.warn{color:var(--warn)} p{color:var(--muted);line-height:1.6}@media(max-width:700px){.widget{grid-template-columns:1fr}.moon{width:150px}}
</style>
</head>
<body>
<main class="widget">
  <div class="moon" id="moon" aria-hidden="true"></div>
  <section>
    <label for="date">Target fall date</label>
    <input id="date" type="date" value="2026-10-10">
    <h1 id="phaseName">Moon phase</h1>
    <span class="quality" id="quality">sky quality</span>
    <p id="copy"></p>
  </section>
</main>
<script>
  // Lightweight approximation for planning UI only. Replace with a verified API or precomputed date data before publishing exact claims.
  function moonAge(date){
    const knownNewMoon = Date.UTC(2000,0,6,18,14);
    const days = (date.getTime() - knownNewMoon) / 86400000;
    return ((days % 29.53058867) + 29.53058867) % 29.53058867;
  }
  function label(age){
    if (age < 1.5 || age > 28) return ['New moon window','Best for faint sky objects','best'];
    if (age < 7.4) return ['Waxing crescent','Good dark-sky compromise','best'];
    if (age < 14.8) return ['Waxing moon','Brighter sky; better for Moon viewing','warn'];
    if (age < 16.2) return ['Full moon window','Great Moon detail, weaker deep sky','warn'];
    if (age < 22.1) return ['Waning moon','Mixed conditions; check rise/set time','warn'];
    return ['Waning crescent','Good dark-sky compromise','best'];
  }
  const input = document.getElementById('date'), moon = document.getElementById('moon'), phaseName = document.getElementById('phaseName'), quality = document.getElementById('quality'), copy = document.getElementById('copy');
  function render(){
    const age = moonAge(new Date(input.value + 'T12:00:00Z'));
    const [name,text,tone] = label(age);
    moon.style.setProperty('--phase', `${10 + (age / 29.53) * 80}%`);
    phaseName.textContent = name;
    quality.textContent = tone === 'best' ? 'better sky window' : 'brighter moon trade-off';
    quality.classList.toggle('warn', tone !== 'best');
    copy.textContent = text + '. Treat this as planning guidance; final date still needs museum slot, weather call, and exact local moon/sunset check.';
  }
  input.addEventListener('input', render); render();
</script>
</body>
</html>
