<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Observatory Sky Status Badges</title>
<style>
  :root{
    --bg:#07111f;
    --panel:#0d1a2c;
    --line:rgba(255,255,255,.14);
    --text:#f7f2ea;
    --muted:rgba(247,242,234,.66);
    --ok:#85efac;
    --warn:#facc15;
    --risk:#fb7185;
    --sky:#8fd7ff;
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100svh;display:grid;place-items:center;background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;padding:28px}
  .panel{width:min(900px,100%);background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:24px}
  h1{margin:0 0 8px;font-size:clamp(32px,5vw,58px);line-height:1;letter-spacing:0}
  .lead{margin:0 0 24px;color:var(--muted);line-height:1.6}
  .status-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .status{
    min-height:150px;
    border:1px solid var(--line);
    border-radius:12px;
    padding:16px;
    background:rgba(255,255,255,.045);
  }
  .badge{display:inline-flex;align-items:center;gap:8px;border-radius:999px;padding:7px 10px;font-size:12px;text-transform:uppercase;letter-spacing:.12em;border:1px solid currentColor}
  .ok{color:var(--ok)} .warn{color:var(--warn)} .risk{color:var(--risk)} .sky{color:var(--sky)}
  h2{margin:22px 0 6px;font-size:22px;letter-spacing:0}
  p{margin:0;color:var(--muted);line-height:1.5}
  .choice-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px}
  button{border:1px solid var(--line);border-radius:999px;padding:10px 13px;background:rgba(255,255,255,.06);color:var(--text);cursor:pointer}
  button[aria-pressed="true"]{border-color:var(--sky);background:rgba(143,215,255,.12)}
  @media(max-width:820px){.status-grid{grid-template-columns:1fr 1fr}}
  @media(max-width:520px){.status-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<main class="panel">
  <h1>Sky status layer</h1>
  <p class="lead">Use these on Plan draft and Plan. They keep astronomy practical: weather call, booking state, moon/date quality, and safe return.</p>

  <div class="choice-row" role="group" aria-label="Weather scenario">
    <button type="button" aria-pressed="true" data-state="pending">Before 14:00</button>
    <button type="button" aria-pressed="false" data-state="confirmed">Clear-sky confirmed</button>
    <button type="button" aria-pressed="false" data-state="cancelled">Clouds cancelled</button>
  </div>

  <section class="status-grid" id="grid" aria-live="polite"></section>
</main>
<script>
  const scenarios = {
    pending: [
      ['warn','Weather call','Wait for museum SMS/phone confirmation by 13:00-14:00.'],
      ['sky','Moon window','Prefer near-new-moon dates for faint sky objects.'],
      ['ok','Booking','Night telescope registration should already be requested.'],
      ['warn','Return safety','Plan one rested driver or driver swap after the late program.']
    ],
    confirmed: [
      ['ok','Weather call','Clear-sky observation is confirmed. Keep phone reachable.'],
      ['sky','Moon window','Check selected date: moon is part of the viewing quality.'],
      ['ok','Booking','Arrive 30-45 minutes before the registered slot.'],
      ['warn','Return safety','No alcohol if driving; leave if driver fatigue climbs.']
    ],
    cancelled: [
      ['risk','Weather call','Night telescope cancelled. Use Plan-B or reschedule.'],
      ['warn','Moon window','Moon quality no longer matters if clouds block the sky.'],
      ['ok','Plan-B','Use day tour/deck, outdoor exhibition, Mindunai or Moletai warm-up.'],
      ['ok','Return safety','Shorten the day if the anchor is cancelled.']
    ]
  };
  const grid = document.getElementById('grid');
  function render(state){
    grid.innerHTML = scenarios[state].map(([tone,title,copy]) => `
      <article class="status">
        <span class="badge ${tone}">${tone}</span>
        <h2>${title}</h2>
        <p>${copy}</p>
      </article>
    `).join('');
  }
  document.querySelectorAll('[data-state]').forEach(button => {
    button.addEventListener('click', () => {
      document.querySelectorAll('[data-state]').forEach(next => next.setAttribute('aria-pressed','false'));
      button.setAttribute('aria-pressed','true');
      render(button.dataset.state);
    });
  });
  render('pending');
</script>
</body>
</html>
