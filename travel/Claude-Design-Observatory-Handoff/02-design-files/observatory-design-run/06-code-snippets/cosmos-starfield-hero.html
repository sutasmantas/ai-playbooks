<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cosmos Starfield Hero</title>
<style>
  :root{
    --bg0:#030712;
    --bg1:#071426;
    --bg2:#17213b;
    --star:#f4fbff;
    --accent:#8fd7ff;
    --amber:#d8a15f;
    --text:#f7f2ea;
    --muted:rgba(247,242,234,.68);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--bg0);color:var(--text)}
  .hero{
    position:relative;
    min-height:100svh;
    display:grid;
    align-items:center;
    overflow:hidden;
    padding:clamp(28px,6vw,80px);
    background:
      radial-gradient(circle at 72% 28%, rgba(143,215,255,.2), transparent 26rem),
      radial-gradient(circle at 22% 74%, rgba(216,161,95,.14), transparent 24rem),
      linear-gradient(145deg, var(--bg1), var(--bg0) 62%, var(--bg2));
  }
  .stars,.stars:before,.stars:after{
    content:"";
    position:absolute;
    inset:-20%;
    background-repeat:repeat;
    background-image:
      radial-gradient(1px 1px at 20px 30px, var(--star), transparent),
      radial-gradient(1px 1px at 90px 80px, rgba(244,251,255,.72), transparent),
      radial-gradient(1px 1px at 160px 40px, rgba(244,251,255,.55), transparent),
      radial-gradient(1.4px 1.4px at 230px 130px, rgba(244,251,255,.85), transparent);
    background-size:260px 180px;
    opacity:.75;
    transform:translateZ(0);
  }
  .stars:before{background-size:420px 300px;opacity:.45;filter:blur(.3px)}
  .stars:after{background-size:680px 440px;opacity:.28;filter:blur(.6px)}
  .orbit{
    position:absolute;
    width:min(760px,90vw);
    aspect-ratio:1;
    right:max(-220px,-16vw);
    top:50%;
    transform:translateY(-50%) rotate(-18deg);
    border:1px solid rgba(143,215,255,.18);
    border-radius:50%;
  }
  .orbit:before,.orbit:after{
    content:"";
    position:absolute;
    inset:12%;
    border:1px solid rgba(216,161,95,.16);
    border-radius:50%;
  }
  .planet{
    position:absolute;
    left:10%;
    top:50%;
    width:72px;
    height:72px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 32%, #fff1bd, #d8a15f 38%, #5d3725 74%);
    box-shadow:0 0 52px rgba(216,161,95,.45);
  }
  .copy{position:relative;z-index:2;max-width:760px}
  .eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent)}
  h1{margin:16px 0 0;font-size:clamp(48px,9vw,118px);line-height:.88;letter-spacing:0;max-width:10ch}
  p{max-width:52ch;line-height:1.7;color:var(--muted);font-size:clamp(17px,2vw,22px)}
  .actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:28px}
  a{color:var(--text);text-decoration:none;border:1px solid rgba(247,242,234,.28);border-radius:999px;padding:13px 18px;background:rgba(247,242,234,.08)}
  a.primary{background:var(--accent);color:#06101d;border-color:transparent}
  @media (prefers-reduced-motion:no-preference){
    .stars{animation:drift 36s linear infinite}
    .stars:before{animation:drift 58s linear infinite reverse}
    .stars:after{animation:drift 82s linear infinite}
    .planet{animation:float 8s ease-in-out infinite alternate}
  }
  @keyframes drift{to{transform:translate3d(-260px,180px,0)}}
  @keyframes float{to{transform:translateY(-18px) scale(1.04)}}
</style>
</head>
<body>
<section class="hero">
  <div class="stars" aria-hidden="true"></div>
  <div class="orbit" aria-hidden="true"><div class="planet"></div></div>
  <div class="copy">
    <p class="eyebrow">Default destination · Observatory</p>
    <h1>One clear-sky call.</h1>
    <p>A one-day fall run from Kaunas to the telescope: choose the route stop, protect the night slot, wait for the weather call, and drive home under the dark.</p>
    <div class="actions">
      <a class="primary" href="#">Plan Observatory</a>
      <a href="#">Switch to Poland</a>
    </div>
  </div>
</section>
</body>
</html>
