<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mini Sky Panel</title>
<style>
  :root{--bg:#06101d;--panel:#0d1a2c;--text:#f8f1e7;--muted:rgba(248,241,231,.65);--line:rgba(248,241,231,.16);--sky:#8fd7ff}
  *{box-sizing:border-box} body{margin:0;min-height:100svh;display:grid;place-items:center;background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;padding:28px}
  .panel{width:min(760px,100%);background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px}.sky{position:relative;aspect-ratio:16/9;border-radius:12px;overflow:hidden;background:radial-gradient(circle at 50% 110%,rgba(143,215,255,.18),transparent 34%),linear-gradient(#071426,#02050b)}
  .horizon{position:absolute;left:0;right:0;bottom:0;height:28%;background:linear-gradient(transparent,rgba(0,0,0,.85))}.star{position:absolute;width:5px;height:5px;border-radius:50%;background:#fff;box-shadow:0 0 10px #fff}.line{position:absolute;height:1px;background:rgba(143,215,255,.6);transform-origin:left center}
  h1{font-size:clamp(30px,5vw,58px);line-height:1;margin:18px 0 8px;letter-spacing:0}p{color:var(--muted);line-height:1.6}.note{font-size:13px}
</style>
</head>
<body>
<main class="panel">
  <div class="sky" id="sky"><div class="horizon"></div></div>
  <h1>What the sky panel can do</h1>
  <p>Use this as a static fallback or lightweight replacement for a full planetarium embed.</p>
  <p class="note">For exact objects, use VirtualSky/Stellarium-style data only after date/location are confirmed.</p>
</main>
<script>
  const points = [[18,34],[34,24],[51,38],[65,26],[79,41],[48,64]];
  const sky = document.getElementById('sky');
  points.forEach(([x,y],i)=>{
    const s=document.createElement('i'); s.className='star'; s.style.left=x+'%'; s.style.top=y+'%'; sky.appendChild(s);
    if(i){ const [px,py]=points[i-1], dx=x-px, dy=y-py, len=Math.hypot(dx,dy); const l=document.createElement('i'); l.className='line'; l.style.left=px+'%'; l.style.top=py+'%'; l.style.width=len+'%'; l.style.transform=`rotate(${Math.atan2(dy,dx)}rad)`; sky.appendChild(l); }
  });
</script>
</body>
</html>
