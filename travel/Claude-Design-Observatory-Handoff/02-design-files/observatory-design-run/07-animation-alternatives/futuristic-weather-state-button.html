<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Alternative - Futuristic Weather State Button</title>
<style>
  :root{--bg:#06101d;--text:#f8f1e7;--sky:#8fd7ff;--warn:#facc15;--risk:#fb7185}
  body{margin:0;min-height:100svh;display:grid;place-items:center;background:var(--bg);font-family:Inter,system-ui,sans-serif;color:var(--text)}
  .panel{text-align:center}.state{position:relative;min-width:260px;border:1px solid rgba(143,215,255,.35);border-radius:14px;padding:18px 22px;background:linear-gradient(180deg,rgba(143,215,255,.1),rgba(143,215,255,.02));color:var(--text);font-weight:800;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;box-shadow:inset 0 0 20px rgba(143,215,255,.08),0 0 28px rgba(143,215,255,.12)}
  .state:before{content:"";position:absolute;inset:4px;border-radius:10px;border:1px solid rgba(255,255,255,.12);pointer-events:none}.sub{display:block;margin-top:10px;color:rgba(248,241,231,.62);font-size:13px;text-transform:none;font-weight:500;letter-spacing:0}
  .state[data-status="pending"]{--c:var(--warn);--glow:rgba(250,204,21,.28);border-color:rgba(250,204,21,.4)}.state[data-status="confirmed"]{--c:var(--sky);--glow:rgba(143,215,255,.28);border-color:rgba(143,215,255,.5)}.state[data-status="cancelled"]{--c:var(--risk);--glow:rgba(251,113,133,.28);border-color:rgba(251,113,133,.5)}
  .state strong{color:var(--c)}@media(prefers-reduced-motion:no-preference){.state:focus,.state:hover{animation:flicker .9s steps(2,end) infinite}@keyframes flicker{50%{box-shadow:inset 0 0 28px var(--glow),0 0 42px var(--glow)}}}
</style>
</head>
<body>
<main class="panel">
  <button class="state" id="state" data-status="pending" type="button"><strong>Weather pending</strong><span class="sub">Click to cycle status</span></button>
</main>
<script>
  const labels={pending:'Weather pending',confirmed:'Clear sky confirmed',cancelled:'Clouds cancelled'};
  const states=Object.keys(labels), button=document.getElementById('state'); let i=0;
  button.addEventListener('click',()=>{ i=(i+1)%states.length; button.dataset.status=states[i]; button.querySelector('strong').textContent=labels[states[i]]; });
</script>
</body>
</html>
