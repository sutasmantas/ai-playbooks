<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Alternative - SVG Mask Cosmos Transition</title>
<style>
  :root{--text:#f8f1e7;--muted:rgba(248,241,231,.65);--terra:#c66b43;--sky:#8fd7ff}
  *{box-sizing:border-box}
  body{margin:0;min-height:200svh;font-family:Inter,system-ui,sans-serif;background:#06101d;color:var(--text)}
  .stage{position:sticky;top:0;height:100svh;overflow:hidden;display:grid;place-items:center}
  .layer{position:absolute;inset:0}
  .road{background:radial-gradient(circle at 22% 70%,rgba(198,107,67,.35),transparent 24rem),linear-gradient(140deg,#593427,#151f17)}
  .cosmos{background:radial-gradient(circle at 72% 24%,rgba(143,215,255,.22),transparent 24rem),linear-gradient(145deg,#071426,#030712)}
  .cosmos:after{content:"";position:absolute;inset:0;background-image:radial-gradient(1px 1px at 20% 30%,#fff,transparent),radial-gradient(1px 1px at 70% 20%,#fff,transparent),radial-gradient(1px 1px at 45% 72%,#fff,transparent);opacity:.75}
  .mask{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
  .copy{position:relative;z-index:3;text-align:center;padding:28px;max-width:760px}
  .eyebrow{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--sky)}
  h1{font-size:clamp(44px,8vw,110px);line-height:.9;letter-spacing:0;margin:12px 0}
  p{color:var(--muted);font-size:20px;line-height:1.6}
  .scroll{position:relative;z-index:4;margin-top:24px;color:var(--muted)}
  @media(prefers-reduced-motion:reduce){body{min-height:100svh}.stage{position:relative}.mask{display:none}.cosmos{clip-path:none!important}}
</style>
</head>
<body>
<section class="stage" id="stage">
  <div class="layer road"></div>
  <div class="layer cosmos" id="cosmos"></div>
  <svg class="mask" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
    <defs>
      <clipPath id="revealClip" clipPathUnits="objectBoundingBox">
        <path id="clipPath" d="M0,1 C.2,.82 .38,.88 .52,.68 C.7,.42 .82,.22 1,0 L1,1 Z"/>
      </clipPath>
    </defs>
  </svg>
  <div class="copy">
    <p class="eyebrow">Alternative transition</p>
    <h1>Road dusk opens into sky.</h1>
    <p>Use an SVG-mask-inspired reveal when the transition should feel more cinematic than a simple path morph.</p>
    <div class="scroll">Scroll</div>
  </div>
</section>
<script>
  const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const cosmos = document.getElementById('cosmos');
  function update(){
    if (reduce) return;
    const max = document.documentElement.scrollHeight - innerHeight;
    const p = Math.min(1, Math.max(0, scrollY / max));
    cosmos.style.clipPath = `circle(${p * 125}% at ${18 + p * 64}% ${82 - p * 58}%)`;
    requestAnimationFrame(update);
  }
  update();
</script>
</body>
</html>
