<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Alternative - Sparkle Orbit CTA</title>
<style>
  :root{--bg:#06101d;--text:#f8f1e7;--sky:#8fd7ff}
  body{margin:0;min-height:100svh;display:grid;place-items:center;background:var(--bg);font-family:Inter,system-ui,sans-serif}
  .cta{position:relative;border:0;border-radius:999px;padding:18px 28px;background:linear-gradient(90deg,#8fd7ff,#f8f1e7);color:#06101d;font-weight:800;font-size:18px;cursor:pointer;box-shadow:0 0 36px rgba(143,215,255,.28);overflow:visible}
  .spark{position:absolute;width:8px;height:8px;left:calc(var(--x)*1%);top:calc(var(--y)*1%);opacity:0;pointer-events:none}
  .spark:before,.spark:after{content:"";position:absolute;inset:0;background:#fff;clip-path:polygon(50% 0,62% 38%,100% 50%,62% 62%,50% 100%,38% 62%,0 50%,38% 38%)}
  .spark:after{filter:blur(5px);opacity:.65}
  @media(prefers-reduced-motion:no-preference){.cta:hover .spark{animation:spark var(--d) ease-out infinite;animation-delay:var(--delay)}}@keyframes spark{0%{opacity:0;transform:translate(0,0) scale(.3) rotate(0)}35%{opacity:1}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(1.1) rotate(180deg)}}
</style>
</head>
<body>
<button class="cta" type="button" id="cta">Plan the clear-sky run</button>
<script>
  const cta=document.getElementById('cta');
  for(let i=0;i<22;i++){
    const s=document.createElement('i'); s.className='spark';
    s.style.setProperty('--x', 15+Math.random()*70);
    s.style.setProperty('--y', 10+Math.random()*80);
    s.style.setProperty('--tx', (Math.random()*140-70)+'px');
    s.style.setProperty('--ty', (Math.random()*-120-20)+'px');
    s.style.setProperty('--d', .9+Math.random()*1.1+'s');
    s.style.setProperty('--delay', Math.random()*-.9+'s');
    cta.appendChild(s);
  }
</script>
</body>
</html>
