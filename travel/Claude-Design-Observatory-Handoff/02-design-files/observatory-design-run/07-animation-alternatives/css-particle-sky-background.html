<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Alternative - CSS Particle Sky Background</title>
<style>
  :root{--bg:#06101d;--text:#f8f1e7;--muted:rgba(248,241,231,.66);--sky:#8fd7ff}
  *{box-sizing:border-box} body{margin:0;min-height:100svh;display:grid;place-items:center;overflow:hidden;background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif}
  .particles{position:fixed;inset:0;overflow:hidden;background:radial-gradient(circle at 65% 25%,rgba(143,215,255,.14),transparent 28rem),linear-gradient(#071426,#030712)}
  .particle{position:absolute;width:4px;height:4px;border-radius:50%;background:#fff;left:var(--x);top:var(--y);opacity:var(--o);filter:blur(var(--b));box-shadow:0 0 12px rgba(143,215,255,.85)}
  main{position:relative;z-index:2;text-align:center;max-width:780px;padding:28px} h1{font-size:clamp(44px,8vw,110px);line-height:.9;letter-spacing:0;margin:0 0 18px} p{color:var(--muted);font-size:20px;line-height:1.6}
  @media(prefers-reduced-motion:no-preference){.particle{animation:float var(--d) linear infinite;animation-delay:var(--delay)}}@keyframes float{to{transform:translate3d(var(--tx),var(--ty),0);opacity:.05}}
</style>
</head>
<body>
<div class="particles" id="particles"></div>
<main><h1>Particle sky alternative.</h1><p>Use this when a richer CSS particle field is wanted without Three.js.</p></main>
<script>
  const root = document.getElementById('particles');
  for (let i=0;i<120;i++){
    const p=document.createElement('i'); p.className='particle';
    p.style.setProperty('--x', Math.random()*100+'%');
    p.style.setProperty('--y', Math.random()*100+'%');
    p.style.setProperty('--o', .22 + Math.random()*.74);
    p.style.setProperty('--b', Math.random() > .75 ? '1px' : '0px');
    p.style.setProperty('--d', 8 + Math.random()*26 + 's');
    p.style.setProperty('--delay', -Math.random()*20 + 's');
    p.style.setProperty('--tx', (Math.random()*180-90)+'px');
    p.style.setProperty('--ty', (Math.random()*180-90)+'px');
    root.appendChild(p);
  }
</script>
</body>
</html>
